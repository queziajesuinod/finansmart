version: "3.8"

services:
  joseplaneja-app:
    image: node:20
    networks:
      - network_public

    working_dir: /app

    volumes:
      # /app é EFÊMERO de propósito: clona e instala do zero a cada deploy,
      # evitando node_modules velho/quebrado (causa do "vite: Permission denied").
      # Cache do npm — acelera as reinstalações sem persistir código.
      - joseplaneja_npm_cache:/root/.npm

    # Variáveis do backend passadas direto pelo ambiente (o dotenv lê do process.env,
    # sem precisar gerar arquivo .env). Preencha DB_PASS e JWT_SECRET.
    environment:
      NODE_ENV: production
      PORT: "3333"
      FRONTEND_URL: https://joseplaneja.aleftec.com.br
      DB_HOST: 62.72.63.137
      DB_PORT: "5432"
      DB_USER: root
      DB_PASS: COLOQUE_A_SENHA_DO_BANCO
      DB_NAME: finansmart
      DB_SCHEMA: dev
      BILLING_ENABLED: "false"
      JWT_SECRET: TROQUE_POR_UM_SEGREDO_FORTE
      JWT_EXPIRES_IN: 7d
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GOOGLE_CALLBACK_URL: https://joseplaneja.aleftec.com.br/auth/google/callback
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""

    entrypoint: ["bash", "-lc"]

    command:
      - |
        set -eo pipefail

        echo "📦 Instalando git e curl..."
        apt-get update -y
        apt-get install -y --no-install-recommends git curl
        git --version

        echo "📥 Clonando repositório (checkout limpo)..."
        cd /
        rm -rf /app
        git clone --depth 1 https://github.com/queziajesuinod/finansmart.git /app
        cd /app
        test -d server || { echo "❌ Repositório sem a pasta server/. Verifique o push no GitHub."; exit 1; }
        echo "✅ Repositório clonado (server/ presente)"

        echo "🧹 Removendo node_modules/dist commitados (evita binários sem permissão)..."
        rm -rf /app/node_modules /app/dist /app/server/node_modules

        echo "🏗️  Build do frontend (API na mesma origem)..."
        cd /app
        npm install
        VITE_API_URL="" node node_modules/vite/bin/vite.js build

        echo "🔧 Instalando backend + migrations..."
        cd /app/server
        npm install
        node node_modules/sequelize-cli/lib/sequelize db:migrate
        node node_modules/sequelize-cli/lib/sequelize db:seed:all || echo "⚠️ seeders já aplicados (ok)"

        echo "🚀 Subindo a API (serve o frontend em /app/dist)..."
        npm start

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s   # 3 min de tolerância pro 1º boot (clone + build + migrations)

    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 20s
      update_config:
        order: start-first
        failure_action: rollback
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"

        - "traefik.http.routers.joseplaneja.rule=Host(`joseplaneja.aleftec.com.br`)"
        - "traefik.http.routers.joseplaneja.entrypoints=websecure"
        - "traefik.http.routers.joseplaneja.tls=true"
        - "traefik.http.routers.joseplaneja.tls.certresolver=letsencryptresolver"

        # CORS
        - "traefik.http.middlewares.joseplaneja-cors.headers.accesscontrolalloworiginlist=*"
        - "traefik.http.middlewares.joseplaneja-cors.headers.accesscontrolallowmethods=GET,OPTIONS,PUT,POST,DELETE"
        - "traefik.http.middlewares.joseplaneja-cors.headers.accesscontrolallowheaders=Origin,X-Requested-With,Content-Type,Accept,Authorization"
        - "traefik.http.middlewares.joseplaneja-cors.headers.accesscontrolallowcredentials=true"
        - "traefik.http.routers.joseplaneja.middlewares=joseplaneja-cors@docker"

        - "traefik.http.services.joseplaneja.loadbalancer.server.port=3333"
        - "traefik.http.services.joseplaneja.loadbalancer.passHostHeader=true"

networks:
  network_public:
    external: true

volumes:
  joseplaneja_npm_cache:
